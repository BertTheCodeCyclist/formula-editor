<div class="app-shell">
  <header class="app-header">
    <div class="header-content">
      <h1>Formula Editor</h1>
      <p class="subtitle">Create and validate calculated field formulas for analytics views</p>
    </div>
  </header>

  <main class="app-main">
    <div class="view-selector">
      <label for="viewSelect">Target View:</label>
      <select
        id="viewSelect"
        (change)="onViewChange($any($event.target).value)">
        <option value="">-- Select a View --</option>
        @for (view of views; track view.name) {
          <option [value]="view.name">{{ view.name }} ({{ view.columns.length }} columns)</option>
        }
      </select>
      @if (selectedView) {
        <span class="view-badge">{{ selectedView.columns.length }} columns available</span>
      }
    </div>

    <div class="tab-bar">
      <button
        class="tab-btn"
        [class.active]="activeTab === 'template'"
        (click)="activeTab = 'template'">
        Template Builder
      </button>
      <button
        class="tab-btn"
        [class.active]="activeTab === 'freetext'"
        (click)="activeTab = 'freetext'">
        Free-Text Editor
      </button>
    </div>

    <div class="tab-content">
      @if (activeTab === 'template') {
        <app-template-builder
          [columns]="columns"
          (formulaGenerated)="onFormulaFromTemplate($event)">
        </app-template-builder>
      }

      @if (activeTab === 'freetext') {
        <app-formula-editor
          [columns]="columns"
          [formula]="formula"
          (formulaChange)="formula = $event">
        </app-formula-editor>
      }
    </div>
  </main>
</div>
