<div class="min-h-screen" style="background: #f1f5f9;">
  <header class="bg-gradient-to-r from-slate-900 to-indigo-900 px-8 py-7" style="color: #ffffff;">
    <h1 class="text-2xl font-bold tracking-tight m-0" style="color: #ffffff;">Formula Editor</h1>
    <p class="text-sm mt-1 mb-0" style="color: #a5b4fc;">Create and validate calculated field formulas for analytics views</p>
  </header>

  <main class="max-w-[1400px] mx-auto px-8 py-6">
    <div class="rounded-xl shadow-sm border border-gray-200 p-5 mb-6 flex items-center gap-4" style="background: #ffffff;">
      <label class="font-semibold text-sm whitespace-nowrap" for="viewSelect" style="color: #334155;">Target View:</label>
      <p-select
        id="viewSelect"
        [options]="views"
        [(ngModel)]="selectedView"
        optionLabel="name"
        placeholder="-- Select a View --"
        class="w-80"
        [showClear]="true">
      </p-select>
      @if (selectedView) {
        <p-tag [value]="selectedView.columns.length + ' columns available'" severity="info"></p-tag>
      }
    </div>

    @if (!selectedView) {
      <div class="rounded-xl shadow-sm border border-gray-200 p-12 text-center" style="background: #ffffff;">
        <div class="text-lg font-medium mb-2" style="color: #94a3b8;">Select a view to get started</div>
        <div class="text-sm" style="color: #cbd5e1;">Choose a target view above to see available columns and start building formulas</div>
      </div>
    }

    @if (selectedView) {
      <p-tabs [(value)]="activeTab">
        <p-tablist>
          <p-tab value="0">Template Builder</p-tab>
          <p-tab value="1">Free-Text Editor</p-tab>
        </p-tablist>
        <p-tabpanels>
          <p-tabpanel value="0">
            <app-template-builder
              [columns]="columns"
              (formulaGenerated)="onFormulaFromTemplate($event)">
            </app-template-builder>
          </p-tabpanel>
          <p-tabpanel value="1">
            <app-formula-editor
              [columns]="columns"
              [formula]="formula"
              (formulaChange)="formula = $event">
            </app-formula-editor>
          </p-tabpanel>
        </p-tabpanels>
      </p-tabs>
    }
  </main>
</div>
